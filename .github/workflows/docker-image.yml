#
name: Create and publish a Docker image

on:
  push:
    branches:
      - "main"
    tags:
      - "*"
  workflow_dispatch:
  schedule:
    - cron: "58 15 4 * *"
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    name: Build and Push

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{major}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}

  smoke-test:
    runs-on: ubuntu-latest
    name: Smoke test
    needs: build-and-push

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - name: Pull image to test
        run: docker pull ghcr.io/${{ env.IMAGE_OWNER }}/caddy-wikijs-metatags:latest

      - name: Create default smoke-test Caddyfile
        run: |
          mkdir -p smoke
          cat > smoke/Caddyfile <<'EOF'
          :80 {
            respond "ok" 200
          }
          EOF

      - name: Start container with smoke-test config
        run: |
          docker run -d --rm \
            --name caddy-smoke \
            -p 8080:80 \
            -v "$PWD/smoke/Caddyfile:/etc/caddy/Caddyfile:ro" \
            ghcr.io/${{ env.IMAGE_OWNER }}/caddy-wikijs-metatags:latest

      - name: Wait for Caddy to start
        run: sleep 5

      - name: Show container logs
        run: docker logs caddy-smoke

      - name: Smoke test HTTP response
        run: |
          curl --fail --silent http://localhost:8080 | grep -Fx "ok"
